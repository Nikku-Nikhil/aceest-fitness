# ── Shared NodePort Service ────────────────────────────────────────────────────
# Exposes the ACEest Fitness app on NodePort 30080
# Used by the Rolling Update and standard deployments.
# For Blue-Green / Canary / A/B strategies, see their individual YAML files
# which define their own Services with separate NodePorts.
apiVersion: v1
kind: Service
metadata:
  name: aceest-service
  namespace: aceest
  labels:
    app: aceest-fitness
spec:
  type: NodePort
  selector:
    app: aceest-fitness
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5000
      nodePort: 30080
