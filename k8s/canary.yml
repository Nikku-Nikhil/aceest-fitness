# ── Canary Release ─────────────────────────────────────────────────────────────
# Strategy: Canary
#
# Traffic split via replica ratio (no service mesh required):
#   STABLE  → 9 replicas  ≈ 90% of traffic
#   CANARY  → 1 replica   ≈ 10% of traffic
#
# The shared Service selects on `app: aceest-fitness` (matches BOTH deployments).
# Kubernetes load-balances randomly across all matching pods.
#
# To promote canary to full rollout (increase canary replicas, remove stable):
#   kubectl scale deployment aceest-canary -n aceest --replicas=10
#   kubectl delete deployment aceest-stable -n aceest
#
# To roll back (delete canary):
#   kubectl delete deployment aceest-canary -n aceest
#
# Apply:
#   kubectl apply -f k8s/namespace.yml
#   kubectl apply -f k8s/canary.yml
# ─────────────────────────────────────────────────────────────────────────────

# ── STABLE Deployment (90% traffic) ──────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-stable
  namespace: aceest
  labels:
    app: aceest-fitness
    track: stable
    version: v3.2.4
    strategy: canary
spec:
  replicas: 9
  selector:
    matchLabels:
      app: aceest-fitness
      track: stable
  template:
    metadata:
      labels:
        app: aceest-fitness
        track: stable
        version: v3.2.4
    spec:
      containers:
        - name: aceest-fitness
          image: snikhil2001/aceest-fitness:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"

---
# ── CANARY Deployment (10% traffic) ──────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-canary
  namespace: aceest
  labels:
    app: aceest-fitness
    track: canary
    version: v4.0.0
    strategy: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest-fitness
      track: canary
  template:
    metadata:
      labels:
        app: aceest-fitness
        track: canary
        version: v4.0.0
    spec:
      containers:
        - name: aceest-fitness
          # New version under test — replace tag with actual canary image
          image: snikhil2001/aceest-fitness:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"

---
# ── Shared Service (routes to BOTH stable + canary pods) ─────────────────────
apiVersion: v1
kind: Service
metadata:
  name: aceest-canary-svc
  namespace: aceest
  labels:
    app: aceest-fitness
    strategy: canary
spec:
  type: NodePort
  selector:
    app: aceest-fitness   # matches both stable and canary pods
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5000
      nodePort: 30082
