# ── A/B Testing Deployment ─────────────────────────────────────────────────────
# Strategy: A/B Testing
#
# Two versions of the app run simultaneously, each behind its own Service.
# Users are routed to Version A or Version B based on:
#   - Client-side logic (e.g. feature flags, user IDs)
#   - Ingress rules (e.g. cookie / header-based routing)
#   - Separate NodePort endpoints exposed to different test groups
#
# Version A → NodePort 30085  (control group – existing UX)
# Version B → NodePort 30086  (experimental group – new UX/feature)
#
# Monitor metrics per group, then promote the winner.
#
# Rollback (remove losing version):
#   kubectl delete deployment aceest-version-b -n aceest
#   kubectl delete service aceest-svc-b -n aceest
#
# Apply:
#   kubectl apply -f k8s/namespace.yml
#   kubectl apply -f k8s/ab-testing.yml
# ─────────────────────────────────────────────────────────────────────────────

# ── VERSION A Deployment (control group) ──────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-version-a
  namespace: aceest
  labels:
    app: aceest-fitness
    version: "A"
    strategy: ab-testing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      version: "A"
  template:
    metadata:
      labels:
        app: aceest-fitness
        version: "A"
    spec:
      containers:
        - name: aceest-fitness
          image: snikhil2001/aceest-fitness:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: APP_VERSION
              value: "A"
            - name: FEATURE_FLAG
              value: "control"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"

---
# ── VERSION B Deployment (experimental group) ──────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-version-b
  namespace: aceest
  labels:
    app: aceest-fitness
    version: "B"
    strategy: ab-testing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      version: "B"
  template:
    metadata:
      labels:
        app: aceest-fitness
        version: "B"
    spec:
      containers:
        - name: aceest-fitness
          image: snikhil2001/aceest-fitness:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: APP_VERSION
              value: "B"
            - name: FEATURE_FLAG
              value: "experimental"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"

---
# ── Service A (routes to Version A pods) ──────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: aceest-svc-a
  namespace: aceest
  labels:
    app: aceest-fitness
    version: "A"
spec:
  type: NodePort
  selector:
    app: aceest-fitness
    version: "A"
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5000
      nodePort: 30085

---
# ── Service B (routes to Version B pods) ──────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: aceest-svc-b
  namespace: aceest
  labels:
    app: aceest-fitness
    version: "B"
spec:
  type: NodePort
  selector:
    app: aceest-fitness
    version: "B"
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5000
      nodePort: 30086
