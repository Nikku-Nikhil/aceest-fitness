# SonarCloud configuration for ACEest Fitness & Gym
# Project: https://sonarcloud.io/organizations/nikku-nikhil/projects

sonar.projectKey=nikku-nikhil_aceest-fitness
sonar.organization=nikku-nikhil
sonar.projectName=ACEest Fitness & Gym
sonar.projectVersion=3.2.4

# Source & test paths
sonar.sources=app.py
sonar.tests=test_app.py
sonar.language=py
sonar.python.version=3.12

# Coverage report (generated by pytest-cov)
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions
sonar.exclusions=**/venv/**,**/__pycache__/**,**/*.pyc
sonar.coverage.exclusions=test_app.py
